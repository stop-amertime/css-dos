<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-DOS · Running...</title>
  <!--
    Pure HTML + CSS runner. No <script> tag anywhere in this file.
    In CSS mode, the CSS just runs. In theory.
    In Calcite mode, it has frames posted to it by the Calcite worker.
  -->
  <link rel="alternate" href="/cabinet.css" type="text/css" title="cabinet">
  <style>
    /* "Web437 IBM VGA 8x16" from VileR's Oldschool PC Font Pack v2.2,
       CC BY-SA 4.0 — https://int10h.org/oldschool-pc-fonts/
       Self-hosted; license + attribution in /player/fonts/. */
    @font-face {
      font-family: 'WebVGA';
      src: url('/player/fonts/Web437_IBM_VGA_8x16.woff') format('woff');
      font-display: block;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --edit-blue:    #0000aa;
      --edit-gray:    #aaaaaa;
      --edit-black:   #000000;
      --edit-white:   #ffffff;
      --edit-red:     #aa0000;
    }
    body {
      font-family: 'WebVGA', 'Perfect DOS VGA 437', 'Fixedsys', 'Terminal', monospace;
      font-size: 16px;
      line-height: 16px;
      background: var(--edit-blue);
      color: var(--edit-white);
      min-height: 100vh;
      cursor: default;
      image-rendering: pixelated;
      padding: calc(16px + 16px) 0 calc(16px + 16px);
    }
    /* Sticky top menu bar — decorative retro IDE chrome. */
    .menu-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 16px;
      background: var(--edit-gray);
      color: var(--edit-black);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 24px;
      z-index: 10;
      user-select: none;
      line-height: 16px;
    }
    .menu-bar .menu-item .hot { color: var(--edit-red); }
    .menu-bar .menu-title { margin-left: auto; }
    /* Sticky bottom status line. */
    .status-line {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 16px;
      background: var(--edit-gray);
      color: var(--edit-black);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 32px;
      z-index: 10;
      user-select: none;
      line-height: 16px;
    }
    .status-line .skey b { font-weight: normal; color: var(--edit-red); }
    /* Dialog window — flat gray with a hard 1-cell black drop shadow. */
    .window {
      background: var(--edit-gray);
      color: var(--edit-black);
      box-shadow: 6px 6px 0 var(--edit-black);
      border: 1px solid var(--edit-black);
      /* 640px content + 12px padding each side + 1px border each side:
         screen and keyboard are both 640 wide, grey margin uniform. */
      width: 666px;
      max-width: calc(100% - 32px);
      margin: 0 auto;
    }
    .title-bar {
      background: var(--edit-gray);
      color: var(--edit-black);
      text-align: center;
      padding: 0 8px;
      user-select: none;
      height: 16px;
      line-height: 16px;
      border-bottom: 1px solid var(--edit-black);
    }
    .window-body { padding: 12px; }


    .screen-cell {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 640 / 400;
      border: 1px solid var(--edit-black);
      background-color: var(--edit-black);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--edit-gray);
      font-family: inherit;
      font-size: 16px;
      line-height: 16px;
      position: relative;
      margin: 0 auto;
    }
    .loading-msg {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 4px;
      padding: 0 16px;
    }
    .screen {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 640px;
      max-height: 400px;
      image-rendering: pixelated;
      position: relative;
      z-index: 1;
    }
    .status-bar {
      background: var(--edit-gray);
      color: var(--edit-black);
      border: 1px solid var(--edit-black);
      padding: 0 8px;
      height: 16px;
      line-height: 16px;
      margin-top: 8px;
      text-align: center;
    }
    .note {
      margin-top: 8px;
      background: #ffff55;
      color: var(--edit-black);
      border: 1px solid var(--edit-black);
      padding: 4px 8px;
      box-shadow: 6px 6px 0 var(--edit-black);
      margin-bottom: 16px;
    }
    .keyboard {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 12px; /* match .window-body padding for a uniform grey gap */
      user-select: none;
      width: 100%;
    }
    .kb-main {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      grid-template-rows: repeat(6, auto);
      gap: 4px;
    }
    .kb-right-stack { display: grid; grid-template-rows: auto 1fr auto; gap: 4px; justify-items: end; }
    /* Explicit row placement for the 6-row main keyboard.
       Row 1: Esc F1..F10 (cols 1..11).
       Row 2: 1..0 Bksp (cols 1..11).
       Row 3: Tab Q..P (cols 1..11).
       Row 4: Caps A..L Enter (cols 1..11).
       Row 5: Shift Z..slash (cols 1..11).
       Row 6: Ctrl Space (Ctrl col 1, Space cols 2..-1). */
    #kb-esc, #kb-esc-hold { grid-row: 1; grid-column: 1; }
    #kb-f1, #kb-f1-hold { grid-row: 1; grid-column: 2; }
    #kb-f2, #kb-f2-hold { grid-row: 1; grid-column: 3; }
    #kb-f3, #kb-f3-hold { grid-row: 1; grid-column: 4; }
    #kb-f4, #kb-f4-hold { grid-row: 1; grid-column: 5; }
    #kb-f5, #kb-f5-hold { grid-row: 1; grid-column: 6; }
    #kb-f6, #kb-f6-hold { grid-row: 1; grid-column: 7; }
    #kb-f7, #kb-f7-hold { grid-row: 1; grid-column: 8; }
    #kb-f8, #kb-f8-hold { grid-row: 1; grid-column: 9; }
    #kb-f9, #kb-f9-hold { grid-row: 1; grid-column: 10; }
    #kb-f10, #kb-f10-hold { grid-row: 1; grid-column: 11; }
    #kb-1, #kb-1-hold { grid-row: 2; grid-column: 1; }
    #kb-2, #kb-2-hold { grid-row: 2; grid-column: 2; }
    #kb-3, #kb-3-hold { grid-row: 2; grid-column: 3; }
    #kb-4, #kb-4-hold { grid-row: 2; grid-column: 4; }
    #kb-5, #kb-5-hold { grid-row: 2; grid-column: 5; }
    #kb-6, #kb-6-hold { grid-row: 2; grid-column: 6; }
    #kb-7, #kb-7-hold { grid-row: 2; grid-column: 7; }
    #kb-8, #kb-8-hold { grid-row: 2; grid-column: 8; }
    #kb-9, #kb-9-hold { grid-row: 2; grid-column: 9; }
    #kb-0, #kb-0-hold { grid-row: 2; grid-column: 10; }
    #kb-bksp, #kb-bksp-hold { grid-row: 2; grid-column: 11; }
    #kb-tab, #kb-tab-hold { grid-row: 3; grid-column: 1; }
    #kb-q, #kb-q-hold { grid-row: 3; grid-column: 2; }
    #kb-w, #kb-w-hold { grid-row: 3; grid-column: 3; }
    #kb-e, #kb-e-hold { grid-row: 3; grid-column: 4; }
    #kb-r, #kb-r-hold { grid-row: 3; grid-column: 5; }
    #kb-t, #kb-t-hold { grid-row: 3; grid-column: 6; }
    #kb-y, #kb-y-hold { grid-row: 3; grid-column: 7; }
    #kb-u, #kb-u-hold { grid-row: 3; grid-column: 8; }
    #kb-i, #kb-i-hold { grid-row: 3; grid-column: 9; }
    #kb-o, #kb-o-hold { grid-row: 3; grid-column: 10; }
    #kb-p, #kb-p-hold { grid-row: 3; grid-column: 11; }
    #kb-caps, #kb-caps-hold { grid-row: 4; grid-column: 1; }
    #kb-a, #kb-a-hold { grid-row: 4; grid-column: 2; }
    #kb-s, #kb-s-hold { grid-row: 4; grid-column: 3; }
    #kb-d, #kb-d-hold { grid-row: 4; grid-column: 4; }
    #kb-f, #kb-f-hold { grid-row: 4; grid-column: 5; }
    #kb-g, #kb-g-hold { grid-row: 4; grid-column: 6; }
    #kb-h, #kb-h-hold { grid-row: 4; grid-column: 7; }
    #kb-j, #kb-j-hold { grid-row: 4; grid-column: 8; }
    #kb-k, #kb-k-hold { grid-row: 4; grid-column: 9; }
    #kb-l, #kb-l-hold { grid-row: 4; grid-column: 10; }
    #kb-enter, #kb-enter-hold { grid-row: 4; grid-column: 11; }
    #kb-shift, #kb-shift-hold { grid-row: 5; grid-column: 1; }
    #kb-z, #kb-z-hold { grid-row: 5; grid-column: 2; }
    #kb-x, #kb-x-hold { grid-row: 5; grid-column: 3; }
    #kb-c, #kb-c-hold { grid-row: 5; grid-column: 4; }
    #kb-v, #kb-v-hold { grid-row: 5; grid-column: 5; }
    #kb-b, #kb-b-hold { grid-row: 5; grid-column: 6; }
    #kb-n, #kb-n-hold { grid-row: 5; grid-column: 7; }
    #kb-m, #kb-m-hold { grid-row: 5; grid-column: 8; }
    #kb-comma, #kb-comma-hold { grid-row: 5; grid-column: 9; }
    #kb-period, #kb-period-hold { grid-row: 5; grid-column: 10; }
    #kb-slash, #kb-slash-hold { grid-row: 5; grid-column: 11; }
    #kb-ctrl, #kb-ctrl-hold { grid-row: 6; grid-column: 1; }
    #kb-space, #kb-space-hold { grid-row: 6; grid-column: 2 / -1; }
    .kb-arrows {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      gap: 4px;
      grid-row: 3;
      justify-self: end;
    }
    /* EDIT-style key buttons: gray bar with a 1-cell black drop shadow. */
    .kb-key {
      background: var(--edit-white);
      color: var(--edit-black);
      border: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 14px;
      padding: 0;
      height: 26px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      box-shadow: 3px 3px 0 var(--edit-black);
    }
    .kb-key:hover { background: var(--edit-gray); }
    .kb-key:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }
    .kb-enter { background: #ffff55; font-size: 16px; }
    .kb-space { height: 22px; }
    .kb-mod, .kb-fn { font-size: 11px; }
    #kb-ctrl  { height: 22px; }
    /* CSS-drawn arrow (2px shaft + head), one shape rotated per
       direction. A font glyph sits off-centre in its character cell, so
       each rotation drifted a different way; a clipped square centres
       exactly by construction. */
    .kb-arrow { height: 40px; }
    .kb-arrow span {
      display: block;
      width: 16px;
      height: 16px;
      background: var(--edit-black);
      clip-path: polygon(
        0 7px, 9px 7px, 9px 3px,      /* shaft top + head upper edge */
        16px 8px,                      /* tip */
        9px 13px, 9px 9px, 0 9px      /* head lower edge + shaft bottom */
      );
    }
    .kb-up    span { transform: rotate(-90deg); }
    .kb-down  span { transform: rotate(90deg); }
    .kb-left  span { transform: rotate(180deg); }
    .kb-up    { grid-column: 2; grid-row: 1; }
    .kb-left  { grid-column: 1; grid-row: 2; }
    .kb-down  { grid-column: 2; grid-row: 2; }
    .kb-right { grid-column: 3; grid-row: 2; }
    /* Arrow pins share their key's cell (arrows place by class above). */
    #kb-up-hold    { grid-column: 2; grid-row: 1; }
    #kb-left-hold  { grid-column: 1; grid-row: 2; }
    #kb-down-hold  { grid-column: 2; grid-row: 2; }
    #kb-right-hold { grid-column: 3; grid-row: 2; }
    /* Hold mode + per-key pins. Each key has a pin checkbox in the same
       grid cell (top-right corner). Checking a pin marks the key held:
       the cabinet's `#kb-X-hold:checked { --keyboard: V }` rule does the
       holding in the raw player; the calcite bridge mirrors the pin via
       set_pseudo_class_active('checked', ...) when the key is next
       pressed. Pins are hidden until the Hold toggle is on; a checked
       pin stays visible so it can always be unpinned. */
    .kb-holdmode-toggle {
      appearance: none;
      position: absolute;
      width: 0; height: 0;
      margin: 0;
    }
    .kb-pin {
      appearance: none;
      display: none;
      width: 14px;
      height: 14px;
      justify-self: end;
      align-self: start;
      z-index: 1;
      margin: 2px 2px 0 0;
      background: var(--edit-white);
      border: 1px solid var(--edit-black);
      cursor: pointer;
    }
    #kb-holdmode:checked ~ .kb-main .kb-pin,
    #kb-holdmode:checked ~ .kb-right-stack .kb-pin { display: block; }
    .kb-pin:checked {
      display: block;
      background: var(--edit-red);
      box-shadow: inset 2px 2px 0 var(--edit-white);
    }
    /* A pinned key looks held down. */
    .kb-key:has(+ .kb-pin:checked) {
      transform: translate(3px, 3px);
      box-shadow: none;
      background: var(--edit-gray);
    }
    #kb-hold { grid-row: 1; padding: 0 10px; height: 26px; }
    #kb-holdmode:checked ~ .kb-right-stack #kb-hold {
      transform: translate(3px, 3px);
      box-shadow: none;
      background: #ffff55;
    }
    /* The sink iframe swallows every keyboard form submission so the
       page doesn't navigate. 0px/hidden keeps it invisible. The
       keyboard is a GET form: each key is a submit button (name=key)
       and the checked pins ride along as repeated name=held params, so
       the bridge always sees the full held-key set. */

    .kbd-sink { width: 0; height: 0; border: 0; position: absolute; visibility: hidden; }

    /* Embedded mode — /player/calcite.html#embed (the site's Play-page
       iframe). The fragment targets a display:none anchor (an invisible
       target is skipped by scroll-into-view, so loading the iframe can't
       scroll the parent page) and :has(:target) hides the decorative
       desktop chrome — the frame is just the screen + keyboard. The
       popped-out player keeps the full blue desktop. Pure CSS — this
       file stays script-free. */
    .embed-anchor { display: none; }
    body:has(#embed:target) {
      background: var(--edit-gray);
      padding: 4px 0;
      min-height: 0;
    }
    body:has(#embed:target) .menu-bar,
    body:has(#embed:target) .status-line { display: none; }
    /* Every pixel of the iframe is playing surface: no desktop margin
       around the window, tighter body padding. (The host page already
       provides the frame.) */
    body:has(#embed:target) .window {
      box-shadow: none;
      border: none;
      max-width: 100%;
    }
    body:has(#embed:target) .window-body { padding: 8px 6px; }
  </style>
</head>
<body>
  <a id="embed" class="embed-anchor" aria-hidden="true"></a>
  <!-- Sticky top menu bar — decorative retro IDE chrome. -->
  <div class="menu-bar">
    <span class="menu-item"><span class="hot">F</span>ile</span>
    <span class="menu-item"><span class="hot">E</span>dit</span>
    <span class="menu-item"><span class="hot">V</span>iew</span>
    <span class="menu-item"><span class="hot">O</span>ptions</span>
    <span class="menu-item"><span class="hot">H</span>elp</span>
    <span class="menu-title">CSS-DOS - PLAYING</span>
  </div>

  <div class="window">
    <div class="window-body">
      <div class="screen-cell">
        <div class="loading-msg">
          <div>Parsing ~300 MB of CSS text (a lot)...</div>
          <div>Your browser may hang/look unresponsive</div>
          <div>Just wait ~10 seconds and it'll start.</div>
        </div>
        <img id="calcite-screen"
             class="screen"
             src="/_stream/fb"
             alt=""
             width="640" height="400">
      </div>
      <form class="keyboard" action="/_kbd" method="get" target="kbd-sink">
        <!-- Hold mode: a pure-CSS checkbox. While checked, every key
             shows its "pin" checkbox. Pinning a key marks it held:
             in the raw player the cabinet's `#kb-X-hold:checked` rule
             holds the key directly; in the calcite player the pin set
             rides along on every key submission (name=held) and the
             bridge latches the pseudo-class. Not part of the form data
             (no name attribute). -->
        <input type="checkbox" id="kb-holdmode" class="kb-holdmode-toggle" aria-label="Hold mode">
        <div class="kb-main">
          <button id="kb-f1" class="kb-key kb-fn" type="submit" name="key" value="kb-f1">F1</button><input type="checkbox" id="kb-f1-hold" class="kb-pin" name="held" value="kb-f1" title="Pin (hold) this key">
          <button id="kb-f2" class="kb-key kb-fn" type="submit" name="key" value="kb-f2">F2</button><input type="checkbox" id="kb-f2-hold" class="kb-pin" name="held" value="kb-f2" title="Pin (hold) this key">
          <button id="kb-f3" class="kb-key kb-fn" type="submit" name="key" value="kb-f3">F3</button><input type="checkbox" id="kb-f3-hold" class="kb-pin" name="held" value="kb-f3" title="Pin (hold) this key">
          <button id="kb-f4" class="kb-key kb-fn" type="submit" name="key" value="kb-f4">F4</button><input type="checkbox" id="kb-f4-hold" class="kb-pin" name="held" value="kb-f4" title="Pin (hold) this key">
          <button id="kb-f5" class="kb-key kb-fn" type="submit" name="key" value="kb-f5">F5</button><input type="checkbox" id="kb-f5-hold" class="kb-pin" name="held" value="kb-f5" title="Pin (hold) this key">
          <button id="kb-f6" class="kb-key kb-fn" type="submit" name="key" value="kb-f6">F6</button><input type="checkbox" id="kb-f6-hold" class="kb-pin" name="held" value="kb-f6" title="Pin (hold) this key">
          <button id="kb-f7" class="kb-key kb-fn" type="submit" name="key" value="kb-f7">F7</button><input type="checkbox" id="kb-f7-hold" class="kb-pin" name="held" value="kb-f7" title="Pin (hold) this key">
          <button id="kb-f8" class="kb-key kb-fn" type="submit" name="key" value="kb-f8">F8</button><input type="checkbox" id="kb-f8-hold" class="kb-pin" name="held" value="kb-f8" title="Pin (hold) this key">
          <button id="kb-f9" class="kb-key kb-fn" type="submit" name="key" value="kb-f9">F9</button><input type="checkbox" id="kb-f9-hold" class="kb-pin" name="held" value="kb-f9" title="Pin (hold) this key">
          <button id="kb-f10" class="kb-key kb-fn" type="submit" name="key" value="kb-f10">F10</button><input type="checkbox" id="kb-f10-hold" class="kb-pin" name="held" value="kb-f10" title="Pin (hold) this key">
          <button id="kb-esc" class="kb-key kb-mod" type="submit" name="key" value="kb-esc">Esc</button><input type="checkbox" id="kb-esc-hold" class="kb-pin" name="held" value="kb-esc" title="Pin (hold) this key">
          <button id="kb-1" class="kb-key kb-num" type="submit" name="key" value="kb-1">1</button><input type="checkbox" id="kb-1-hold" class="kb-pin" name="held" value="kb-1" title="Pin (hold) this key">
          <button id="kb-2" class="kb-key kb-num" type="submit" name="key" value="kb-2">2</button><input type="checkbox" id="kb-2-hold" class="kb-pin" name="held" value="kb-2" title="Pin (hold) this key">
          <button id="kb-3" class="kb-key kb-num" type="submit" name="key" value="kb-3">3</button><input type="checkbox" id="kb-3-hold" class="kb-pin" name="held" value="kb-3" title="Pin (hold) this key">
          <button id="kb-4" class="kb-key kb-num" type="submit" name="key" value="kb-4">4</button><input type="checkbox" id="kb-4-hold" class="kb-pin" name="held" value="kb-4" title="Pin (hold) this key">
          <button id="kb-5" class="kb-key kb-num" type="submit" name="key" value="kb-5">5</button><input type="checkbox" id="kb-5-hold" class="kb-pin" name="held" value="kb-5" title="Pin (hold) this key">
          <button id="kb-6" class="kb-key kb-num" type="submit" name="key" value="kb-6">6</button><input type="checkbox" id="kb-6-hold" class="kb-pin" name="held" value="kb-6" title="Pin (hold) this key">
          <button id="kb-7" class="kb-key kb-num" type="submit" name="key" value="kb-7">7</button><input type="checkbox" id="kb-7-hold" class="kb-pin" name="held" value="kb-7" title="Pin (hold) this key">
          <button id="kb-8" class="kb-key kb-num" type="submit" name="key" value="kb-8">8</button><input type="checkbox" id="kb-8-hold" class="kb-pin" name="held" value="kb-8" title="Pin (hold) this key">
          <button id="kb-9" class="kb-key kb-num" type="submit" name="key" value="kb-9">9</button><input type="checkbox" id="kb-9-hold" class="kb-pin" name="held" value="kb-9" title="Pin (hold) this key">
          <button id="kb-0" class="kb-key kb-num" type="submit" name="key" value="kb-0">0</button><input type="checkbox" id="kb-0-hold" class="kb-pin" name="held" value="kb-0" title="Pin (hold) this key">
          <button id="kb-bksp" class="kb-key kb-mod" type="submit" name="key" value="kb-bksp">Bksp</button><input type="checkbox" id="kb-bksp-hold" class="kb-pin" name="held" value="kb-bksp" title="Pin (hold) this key">
          <button id="kb-q" class="kb-key" type="submit" name="key" value="kb-q">Q</button><input type="checkbox" id="kb-q-hold" class="kb-pin" name="held" value="kb-q" title="Pin (hold) this key">
          <button id="kb-w" class="kb-key" type="submit" name="key" value="kb-w">W</button><input type="checkbox" id="kb-w-hold" class="kb-pin" name="held" value="kb-w" title="Pin (hold) this key">
          <button id="kb-e" class="kb-key" type="submit" name="key" value="kb-e">E</button><input type="checkbox" id="kb-e-hold" class="kb-pin" name="held" value="kb-e" title="Pin (hold) this key">
          <button id="kb-r" class="kb-key" type="submit" name="key" value="kb-r">R</button><input type="checkbox" id="kb-r-hold" class="kb-pin" name="held" value="kb-r" title="Pin (hold) this key">
