<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-DOS · Running...</title>
  <!--
    Pure HTML + CSS runner. No <script> tag anywhere in this file.
    In CSS mode, the CSS just runs. In theory.
    In Calcite mode, it has frames posted to it by the Calcite worker.
  -->
  <link rel="alternate" href="/cabinet.css" type="text/css" title="cabinet">
  <style>
    /* "Web437 IBM VGA 8x16" from VileR's Oldschool PC Font Pack v2.2,
       CC BY-SA 4.0 — https://int10h.org/oldschool-pc-fonts/
       Self-hosted; license + attribution in /player/fonts/. */
    @font-face {
      font-family: 'WebVGA';
      /* Relative, not /player/fonts/…: resolves the same when served
         (this file lives at /player/), and ALSO when the page is
         opened straight from disk — the raw player is meant to run
         with no server at all. */
      src: url('fonts/Web437_IBM_VGA_8x16.woff') format('woff');
      font-display: block;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --edit-blue:    #0000aa;
      --edit-gray:    #aaaaaa;
      --edit-black:   #000000;
      --edit-white:   #ffffff;
      --edit-red:     #aa0000;
    }
    body {
      font-family: 'WebVGA', 'Perfect DOS VGA 437', 'Fixedsys', 'Terminal', monospace;
      font-size: 16px;
      line-height: 16px;
      background: var(--edit-blue);
      color: var(--edit-white);
      min-height: 100vh;
      cursor: default;
      image-rendering: pixelated;
      padding: calc(16px + 16px) 0 calc(16px + 16px);
    }
    /* Sticky top menu bar — decorative retro IDE chrome. */
    .menu-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 16px;
      background: var(--edit-gray);
      color: var(--edit-black);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 24px;
      z-index: 10;
      user-select: none;
      line-height: 16px;
    }
    .menu-bar .menu-item .hot { color: var(--edit-red); }
    .menu-bar .menu-title { margin-left: auto; }
    /* Sticky bottom status line. */
    .status-line {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 16px;
      background: var(--edit-gray);
      color: var(--edit-black);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 32px;
      z-index: 10;
      user-select: none;
      line-height: 16px;
    }
    .status-line .skey b { font-weight: normal; color: var(--edit-red); }
    /* Dialog window — flat gray with a hard 1-cell black drop shadow. */
    .window {
      background: var(--edit-gray);
      color: var(--edit-black);
      box-shadow: 6px 6px 0 var(--edit-black);
      border: 1px solid var(--edit-black);
      /* 640px content + 12px padding each side + 1px border each side:
         screen and keyboard are both 640 wide, grey margin uniform. */
      width: 666px;
      max-width: calc(100% - 32px);
      margin: 0 auto;
    }
    .title-bar {
      background: var(--edit-gray);
      color: var(--edit-black);
      text-align: center;
      padding: 0 8px;
      user-select: none;
      height: 16px;
      line-height: 16px;
      border-bottom: 1px solid var(--edit-black);
    }
    .window-body { padding: 12px; }


    .screen-cell {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 640 / 400;
      border: 1px solid var(--edit-black);
      background-color: var(--edit-black);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--edit-gray);
      font-family: inherit;
      font-size: 16px;
      line-height: 16px;
      position: relative;
      margin: 0 auto;
    }
    .loading-msg {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 4px;
      padding: 0 16px;
    }
    .screen {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 640px;
      max-height: 400px;
      image-rendering: pixelated;
      position: relative;
      z-index: 1;
    }
    /* Mouse surface: an 80×25 grid of invisible submit buttons over the
       screen. Each button is one #mc-N cell of the cabinet's pointing
       surface (kiln emitMouseCellRules) — a tap posts /_kbd?key=mc-N
       through the same SW→bridge pulse path the keyboard uses, which
       the serial-mouse machine turns into move+click packets. Only
       mouse-enabled cabinets react; on others the pulses are inert.
       Generated by the inline script below (2000 nodes). */
    .mouse-grid {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(80, 1fr);
      grid-template-rows: repeat(25, 1fr);
    }
    .mouse-grid button {
      appearance: none;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      cursor: crosshair;
      outline: none;
    }
    .status-bar {
      background: var(--edit-gray);
      color: var(--edit-black);
      border: 1px solid var(--edit-black);
      padding: 0 8px;
      height: 16px;
      line-height: 16px;
      margin-top: 8px;
      text-align: center;
    }
    .note {
      margin-top: 8px;
      background: #ffff55;
      color: var(--edit-black);
      border: 1px solid var(--edit-black);
      padding: 4px 8px;
      box-shadow: 6px 6px 0 var(--edit-black);
      margin-bottom: 16px;
    }
    .keyboard {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 12px; /* match .window-body padding for a uniform grey gap */
      user-select: none;
      width: 100%;
    }
    .kb-main {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      grid-template-rows: repeat(6, auto);
      gap: 4px;
    }
    .kb-right-stack { display: grid; grid-template-rows: auto 1fr auto; gap: 4px; justify-items: end; }
    /* Explicit row placement for the 6-row main keyboard.
       Row 1: Esc F1..F10 (cols 1..11).
       Row 2: 1..0 Bksp (cols 1..11).
       Row 3: Tab Q..P (cols 1..11).
       Row 4: Caps A..L Enter (cols 1..11).
       Row 5: Shift Z..slash (cols 1..11).
       Row 6: Ctrl Space (Ctrl col 1, Space cols 2..-1). */
    #kb-esc { grid-row: 1; grid-column: 1; }
    #kb-f1 { grid-row: 1; grid-column: 2; }
    #kb-f2 { grid-row: 1; grid-column: 3; }
    #kb-f3 { grid-row: 1; grid-column: 4; }
    #kb-f4 { grid-row: 1; grid-column: 5; }
    #kb-f5 { grid-row: 1; grid-column: 6; }
    #kb-f6 { grid-row: 1; grid-column: 7; }
    #kb-f7 { grid-row: 1; grid-column: 8; }
    #kb-f8 { grid-row: 1; grid-column: 9; }
    #kb-f9 { grid-row: 1; grid-column: 10; }
    #kb-f10 { grid-row: 1; grid-column: 11; }
    #kb-1 { grid-row: 2; grid-column: 1; }
    #kb-2 { grid-row: 2; grid-column: 2; }
    #kb-3 { grid-row: 2; grid-column: 3; }
    #kb-4 { grid-row: 2; grid-column: 4; }
    #kb-5 { grid-row: 2; grid-column: 5; }
    #kb-6 { grid-row: 2; grid-column: 6; }
    #kb-7 { grid-row: 2; grid-column: 7; }
    #kb-8 { grid-row: 2; grid-column: 8; }
    #kb-9 { grid-row: 2; grid-column: 9; }
    #kb-0 { grid-row: 2; grid-column: 10; }
    #kb-bksp { grid-row: 2; grid-column: 11; }
    #kb-tab { grid-row: 3; grid-column: 1; }
    #kb-q { grid-row: 3; grid-column: 2; }
    #kb-w { grid-row: 3; grid-column: 3; }
    #kb-e { grid-row: 3; grid-column: 4; }
    #kb-r { grid-row: 3; grid-column: 5; }
    #kb-t { grid-row: 3; grid-column: 6; }
    #kb-y { grid-row: 3; grid-column: 7; }
    #kb-u { grid-row: 3; grid-column: 8; }
    #kb-i { grid-row: 3; grid-column: 9; }
    #kb-o { grid-row: 3; grid-column: 10; }
    #kb-p { grid-row: 3; grid-column: 11; }
    #kb-caps { grid-row: 4; grid-column: 1; }
    #kb-a { grid-row: 4; grid-column: 2; }
    #kb-s { grid-row: 4; grid-column: 3; }
    #kb-d { grid-row: 4; grid-column: 4; }
    #kb-f { grid-row: 4; grid-column: 5; }
    #kb-g { grid-row: 4; grid-column: 6; }
    #kb-h { grid-row: 4; grid-column: 7; }
    #kb-j { grid-row: 4; grid-column: 8; }
    #kb-k { grid-row: 4; grid-column: 9; }
    #kb-l { grid-row: 4; grid-column: 10; }
    #kb-enter { grid-row: 4; grid-column: 11; }
    #kb-shift { grid-row: 5; grid-column: 1; }
    #kb-z { grid-row: 5; grid-column: 2; }
    #kb-x { grid-row: 5; grid-column: 3; }
    #kb-c { grid-row: 5; grid-column: 4; }
    #kb-v { grid-row: 5; grid-column: 5; }
    #kb-b { grid-row: 5; grid-column: 6; }
    #kb-n { grid-row: 5; grid-column: 7; }
    #kb-m { grid-row: 5; grid-column: 8; }
    #kb-comma { grid-row: 5; grid-column: 9; }
    #kb-period { grid-row: 5; grid-column: 10; }
    #kb-slash { grid-row: 5; grid-column: 11; }
    #kb-ctrl { grid-row: 6; grid-column: 1; }
    #kb-alt { grid-row: 6; grid-column: 2; }
    #kb-space { grid-row: 6; grid-column: 3 / -1; }
    .kb-arrows {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      gap: 4px;
      grid-row: 3;
      justify-self: end;
    }
    /* EDIT-style key buttons: gray bar with a 1-cell black drop shadow. */
    .kb-key {
      background: var(--edit-white);
      color: var(--edit-black);
      border: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 14px;
      padding: 0;
      height: 26px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      box-shadow: 3px 3px 0 var(--edit-black);
    }
    .kb-key:hover { background: var(--edit-gray); }
    .kb-key:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }
    .kb-enter { background: #ffff55; font-size: 16px; }
    .kb-space { height: 22px; }
    .kb-mod, .kb-fn { font-size: 11px; }
    #kb-ctrl, #kb-alt { height: 22px; }
    /* CSS-drawn arrow (2px shaft + head), one shape rotated per
       direction. A font glyph sits off-centre in its character cell, so
       each rotation drifted a different way; a clipped square centres
       exactly by construction. */
    .kb-arrow { height: 40px; }
    .kb-arrow span {
      display: block;
      width: 16px;
      height: 16px;
      background: var(--edit-black);
      clip-path: polygon(
        0 7px, 9px 7px, 9px 3px,      /* shaft top + head upper edge */
        16px 8px,                      /* tip */
        9px 13px, 9px 9px, 0 9px      /* head lower edge + shaft bottom */
      );
    }
    .kb-up    span { transform: rotate(-90deg); }
    .kb-down  span { transform: rotate(90deg); }
    .kb-left  span { transform: rotate(180deg); }
    .kb-up    { grid-column: 2; grid-row: 1; }
    .kb-left  { grid-column: 1; grid-row: 2; }
    .kb-down  { grid-column: 2; grid-row: 2; }
    .kb-right { grid-column: 3; grid-row: 2; }
    /* Hold a key — zero <script> in both players, different plumbing.

       CALCITE (this file): #kb-hold is a SUBMIT button like every
       other key (key=kb-hold). The bridge owns the mode: each kb-hold
       press toggles it and mirrors it onto the cabinet's --kbdHold
       wire immediately — so turning the mode OFF releases every held
       key right away, no follow-up key press needed. While the wire
       is up the MACHINE latches key releases (presses accumulate as
       chords); when it drops the machine drains the break codes
       (kiln/patterns/misc.mjs emitKeyboardWires). The page holds no mode
       state (a zero-JS click can't both flip page state and submit),
       so the label can't swap with the mode here; the lamp dot on the
       button is an <img> streamed by the bridge (/_screen/holdlamp)
       showing the machine's ACTUAL wire state — green = holding,
       black = off.

       RAW (raw.html, derived by web/scripts/raw-regen.mjs): the
       button becomes a label toggling the hidden #kb-holdmode
       checkbox, which the cabinet reads directly via
       `&:has(#kb-holdmode:checked) { --kbdHold: 1 }` — immediate by
       construction — and the :checked rules below light the key and
       swap its text (page state is real there, so pure CSS can).
       Those rules are inert in this file (no checkbox here). */
    .kb-state {
      appearance: none;
      position: absolute;
      width: 0; height: 0;
      margin: 0;
    }
    /* The hold button: as wide as the arrow block below it. */
    #kb-hold {
      grid-row: 1;
      width: 128px; /* 3×40px arrows + 2×4px gaps */
      height: 26px;
      font-style: italic;
      position: relative; /* anchors the corner lamp */
    }
    #kb-hold::before { content: "Hold Mode"; }
    /* The hold-mode lamp (calcite only): fed by the bridge's
       /_screen/holdlamp multipart stream — same mechanism as the
       screen <img>. Tucked into the button's top-right corner; the
       black background reads as "off" until (unless) the stream
       delivers, so a dead bridge shows mode off. */
    #kb-hold .kb-lamp {
      position: absolute;
      top: 2px; right: 2px;
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid var(--edit-black);
      background: #000000;
    }
    /* Mode on (raw player only — needs the checkbox): the key stays
       down, lights up, and says so. */
    .keyboard:has(#kb-holdmode:checked) #kb-hold {
      transform: translate(3px, 3px);
      box-shadow: none;
      background: #ffff55;
    }
    .keyboard:has(#kb-holdmode:checked) #kb-hold::before { content: "holding..."; }
    /* The sink iframe swallows every keyboard form submission so the
       page doesn't navigate. 0px/hidden keeps it invisible. The
       keyboard is a GET form: each key is a submit button (name=key);
       kb-hold is just another key value, one the bridge treats as the
       hold-mode toggle instead of a keypress. */

    .kbd-sink { width: 0; height: 0; border: 0; position: absolute; visibility: hidden; }

    /* Embedded mode — /player/calcite.html#embed (the site's Play-page
       iframe). The fragment targets a display:none anchor (an invisible
       target is skipped by scroll-into-view, so loading the iframe can't
       scroll the parent page) and :has(:target) hides the decorative
       desktop chrome — the frame is just the screen + keyboard. The
       popped-out player keeps the full blue desktop. Pure CSS — this
       file stays script-free. */
    .embed-anchor { display: none; }
    body:has(#embed:target) {
      /* #d6d6d6 = the SITE's dialog gray (web/site global.css --edit-gray),
         not this file's EGA #aaaaaa — the iframe must be invisible against
         the window that hosts it. Separate documents, so no shared var. */
      background: #d6d6d6;
      padding: 4px 0;
      min-height: 0;
    }
    body:has(#embed:target) .menu-bar,
    body:has(#embed:target) .status-line { display: none; }
    /* Every pixel of the iframe is playing surface: no desktop margin
       around the window, tighter body padding. (The host page already
       provides the frame.) */
    body:has(#embed:target) .window {
      box-shadow: none;
      border: none;
      max-width: 100%;
      background: #d6d6d6; /* same host-window gray as the body above */
    }
    body:has(#embed:target) .window-body { padding: 8px 6px; }
  </style>
</head>
<body>
  <a id="embed" class="embed-anchor" aria-hidden="true"></a>
  <!-- Sticky top menu bar — decorative retro IDE chrome. -->
  <div class="menu-bar">
    <span class="menu-item"><span class="hot">F</span>ile</span>
    <span class="menu-item"><span class="hot">E</span>dit</span>
    <span class="menu-item"><span class="hot">V</span>iew</span>
    <span class="menu-item"><span class="hot">O</span>ptions</span>
    <span class="menu-item"><span class="hot">H</span>elp</span>
    <span class="menu-title">CSS-DOS - PLAYING</span>
  </div>

  <div class="window">
    <div class="window-body">
      <div class="screen-cell">
        <div class="loading-msg">
          <div>Parsing ~300 MB of CSS text (a lot)...</div>
          <div>Your browser may hang/look unresponsive</div>
          <div>Just wait ~10 seconds and it'll start.</div>
        </div>
        <img id="calcite-screen"
             class="screen"
             src="/_screen/framebuffer"
             alt=""
             width="640" height="400">
        <form class="mouse-grid" action="/_kbd" method="get" target="kbd-sink" aria-hidden="true"></form>
        <script>
          // Fill the mouse grid: 80×25 = 2000 invisible cells, one per
          // #mc-N id of the cabinet's pointing surface. Kept out of the
          // static markup purely for file-size sanity.
          (() => {
            const grid = document.currentScript.previousElementSibling;
            const frag = document.createDocumentFragment();
            for (let n = 0; n < 2000; n++) {
              const b = document.createElement('button');
              b.type = 'submit';
              b.id = 'mc-' + n;
              b.name = 'key';
              b.value = 'mc-' + n;
              b.tabIndex = -1;
              frag.appendChild(b);
            }
            grid.appendChild(frag);
          })();
        </script>
      </div>
      <form class="keyboard" action="/_kbd" method="get" target="kbd-sink">
        <div class="kb-main">
          <button id="kb-f1" class="kb-key kb-fn" type="submit" name="key" value="kb-f1">F1</button>
          <button id="kb-f2" class="kb-key kb-fn" type="submit" name="key" value="kb-f2">F2</button>
          <button id="kb-f3" class="kb-key kb-fn" type="submit" name="key" value="kb-f3">F3</button>
          <button id="kb-f4" class="kb-key kb-fn" type="submit" name="key" value="kb-f4">F4</button>
          <button id="kb-f5" class="kb-key kb-fn" type="submit" name="key" value="kb-f5">F5</button>
          <button id="kb-f6" class="kb-key kb-fn" type="submit" name="key" value="kb-f6">F6</button>
          <button id="kb-f7" class="kb-key kb-fn" type="submit" name="key" value="kb-f7">F7</button>
          <button id="kb-f8" class="kb-key kb-fn" type="submit" name="key" value="kb-f8">F8</button>
          <button id="kb-f9" class="kb-key kb-fn" type="submit" name="key" value="kb-f9">F9</button>
          <button id="kb-f10" class="kb-key kb-fn" type="submit" name="key" value="kb-f10">F10</button>
          <button id="kb-esc" class="kb-key kb-mod" type="submit" name="key" value="kb-esc">Esc</button>
          <button id="kb-1" class="kb-key kb-num" type="submit" name="key" value="kb-1">1</button>
          <button id="kb-2" class="kb-key kb-num" type="submit" name="key" value="kb-2">2</button>
          <button id="kb-3" class="kb-key kb-num" type="submit" name="key" value="kb-3">3</button>
          <button id="kb-4" class="kb-key kb-num" type="submit" name="key" value="kb-4">4</button>
          <button id="kb-5" class="kb-key kb-num" type="submit" name="key" value="kb-5">5</button>
          <button id="kb-6" class="kb-key kb-num" type="submit" name="key" value="kb-6">6</button>
          <button id="kb-7" class="kb-key kb-num" type="submit" name="key" value="kb-7">7</button>
          <button id="kb-8" class="kb-key kb-num" type="submit" name="key" value="kb-8">8</button>
          <button id="kb-9" class="kb-key kb-num" type="submit" name="key" value="kb-9">9</button>
          <button id="kb-0" class="kb-key kb-num" type="submit" name="key" value="kb-0">0</button>
          <button id="kb-bksp" class="kb-key kb-mod" type="submit" name="key" value="kb-bksp">Bksp</button>
          <button id="kb-q" class="kb-key" type="submit" name="key" value="kb-q">Q</button>
          <button id="kb-w" class="kb-key" type="submit" name="key" value="kb-w">W</button>
          <button id="kb-e" class="kb-key" type="submit" name="key" value="kb-e">E</button>
          <button id="kb-r" class="kb-key" type="submit" name="key" value="kb-r">R</button>
          <button id="kb-t" class="kb-key" type="submit" name="key" value="kb-t">T</button>
          <button id="kb-y" class="kb-key" type="submit" name="key" value="kb-y">Y</button>
          <button id="kb-u" class="kb-key" type="submit" name="key" value="kb-u">U</button>
          <button id="kb-i" class="kb-key" type="submit" name="key" value="kb-i">I</button>
          <button id="kb-o" class="kb-key" type="submit" name="key" value="kb-o">O</button>
          <button id="kb-p" class="kb-key" type="submit" name="key" value="kb-p">P</button>
          <button id="kb-tab" class="kb-key kb-mod" type="submit" name="key" value="kb-tab">Tab</button>
          <button id="kb-caps" class="kb-key kb-mod" type="submit" name="key" value="kb-caps">Caps</button>
          <button id="kb-a" class="kb-key" type="submit" name="key" value="kb-a">A</button>
          <button id="kb-s" class="kb-key" type="submit" name="key" value="kb-s">S</button>
          <button id="kb-d" class="kb-key" type="submit" name="key" value="kb-d">D</button>
          <button id="kb-f" class="kb-key" type="submit" name="key" value="kb-f">F</button>
          <button id="kb-g" class="kb-key" type="submit" name="key" value="kb-g">G</button>
          <button id="kb-h" class="kb-key" type="submit" name="key" value="kb-h">H</button>
          <button id="kb-j" class="kb-key" type="submit" name="key" value="kb-j">J</button>
          <button id="kb-k" class="kb-key" type="submit" name="key" value="kb-k">K</button>
          <button id="kb-l" class="kb-key" type="submit" name="key" value="kb-l">L</button>
          <button id="kb-enter" class="kb-key kb-enter" type="submit" name="key" value="kb-enter">&#x21B5;</button>
          <button id="kb-shift" class="kb-key kb-mod" type="submit" name="key" value="kb-shift">Shift</button>
          <button id="kb-z" class="kb-key" type="submit" name="key" value="kb-z">Z</button>
          <button id="kb-x" class="kb-key" type="submit" name="key" value="kb-x">X</button>
          <button id="kb-c" class="kb-key" type="submit" name="key" value="kb-c">C</button>
          <button id="kb-v" class="kb-key" type="submit" name="key" value="kb-v">V</button>
          <button id="kb-b" class="kb-key" type="submit" name="key" value="kb-b">B</button>
          <button id="kb-n" class="kb-key" type="submit" name="key" value="kb-n">N</button>
          <button id="kb-m" class="kb-key" type="submit" name="key" value="kb-m">M</button>
          <button id="kb-comma" class="kb-key" type="submit" name="key" value="kb-comma">,</button>
          <button id="kb-period" class="kb-key" type="submit" name="key" value="kb-period">.</button>
          <button id="kb-slash" class="kb-key" type="submit" name="key" value="kb-slash">/</button>
          <button id="kb-ctrl" class="kb-key kb-mod" type="submit" name="key" value="kb-ctrl">Ctrl</button>
          <button id="kb-alt" class="kb-key kb-mod" type="submit" name="key" value="kb-alt">Alt</button>
          <button id="kb-space" class="kb-key kb-space" type="submit" name="key" value="kb-space">&#x2423;</button>
        </div>
        <div class="kb-right-stack">
          <!-- Hold-mode toggle: a submit button like every other key.
               The bridge flips the --kbdHold wire on each press and
               releases all held keys the moment the mode turns off.
               The lamp <img> is streamed by the bridge — see the hold
               CSS block. -->
          <button id="kb-hold" class="kb-key kb-mod" type="submit" name="key" value="kb-hold" title="Hold Mode: while the lamp is lit, pressed keys stay held (chords); tap again to turn off and release them all"><img class="kb-lamp" src="/_screen/holdlamp" alt="" width="10" height="10"></button>
          <div class="kb-arrows">
            <button id="kb-up" class="kb-key kb-arrow kb-up" type="submit" name="key" value="kb-up" aria-label="Up"><span></span></button>
            <button id="kb-left" class="kb-key kb-arrow kb-left" type="submit" name="key" value="kb-left" aria-label="Left"><span></span></button>
            <button id="kb-down" class="kb-key kb-arrow kb-down" type="submit" name="key" value="kb-down" aria-label="Down"><span></span></button>
            <button id="kb-right" class="kb-key kb-arrow kb-right" type="submit" name="key" value="kb-right" aria-label="Right"><span></span></button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <iframe name="kbd-sink" class="kbd-sink"></iframe>
  <!-- SW heartbeat: self-refreshing hidden iframe (see heartbeat.html).
       Keeps the service worker alive so the screen + hold-lamp streams
       survive idle watching. Separate from kbd-sink — key submissions
       navigate that one and would blow the heartbeat away. -->
  <iframe class="kbd-sink" src="/player/heartbeat.html" aria-hidden="true"></iframe>
  <!-- Sticky bottom status line. -->
  <div class="status-line">
    <span class="skey"><b>F1</b>=Help</span>
    <span class="skey"><b>F5</b>=Reload</span>
    <span class="skey"><b>Esc</b>=Cancel</span>
    <span class="skey" style="margin-left:auto">CALCITE</span>
  </div>
</body>
</html>
