<!DOCTYPE html>
<!-- Service-worker heartbeat. Loaded by the calcite player in a hidden
     iframe; the meta refresh re-navigates every 20s, and each
     navigation dispatches a fetch event to the service worker, which
     resets Chrome's ~30s SW idle-kill timer. Without it the SW dies
     while the user just watches (frame broadcasts are not events!) and
     the screen + hold-lamp multipart streams die with it - the player
     freezes until reload. Same-URL meta refresh replaces the history
     entry, so this never pollutes the back button. Zero <script>,
     like everything else in the player. -->
<meta http-equiv="refresh" content="20">
<title>css-dos sw heartbeat</title>
